<header class="w-full sticky top-0 z-50 bg-white/80 dark:bg-[#0D1B2A]/90 backdrop-blur-xl shadow-sm dark:shadow-none dark:border-b dark:border-white/10 transition-colors duration-300">
  <div class="max-w-7xl mx-auto px-4 sm:px-6">
    <nav class="h-14 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2">
        <img src="logo.jpg" alt="Pigcoder" class="w-8 h-8 rounded-full object-cover" />
        <span class="text-[#1B3A6B] dark:text-white" style="font-weight:700;font-size:1.1rem;letter-spacing:-0.01em;">pigcoder</span>
      </a>
      <div class="hidden md:flex items-center gap-8">
        <a data-nav-key="index" data-i18n="common.nav.index" href="index.html">首页</a>
        <a data-nav-key="docs" data-i18n="common.nav.docs" href="docs.html">文档</a>

      <div class="flex items-center gap-2 sm:gap-4">

          <span id="language-toggle-label" class="hidden sm:inline text-xs font-semibold tracking-[0.18em]">EN</span>
        </button>
        <span id="theme-toggle" class="material-symbols-outlined text-custom-navy dark:text-white cursor-pointer hover:text-custom-gold transition-colors">dark_mode</span>
        <a href="https://sub2.pigcoder.com/login" data-i18n="common.header.console" class="bg-custom-navy text-white px-3 sm:px-6 py-2 rounded font-semibold active:scale-95 transition-all text-sm sm:text-base">控制台</a>

        </button>

    </nav>
    <div id="mobile-nav-panel" class="hidden md:hidden pb-4">
      <div class="rounded-3xl border border-slate-200/80 dark:border-white/15 bg-slate-50/95 dark:bg-[#162842]/96 backdrop-blur-xl shadow-[0_18px_40px_rgba(15,23,42,0.16)] p-3">

          <a
            data-nav-key="index"
            data-nav-active-class="block rounded-2xl px-4 py-3 text-sm font-semibold bg-[#1B3A6B] text-white"

          <a
            data-nav-key="docs"
            data-nav-active-class="block rounded-2xl px-4 py-3 text-sm font-semibold bg-[#1B3A6B] text-white"
            data-nav-inactive-class="block rounded-2xl px-4 py-3 text-sm font-medium text-custom-navy bg-white/80 dark:text-white dark:bg-white/10 hover:bg-white dark:hover:bg-white/15 transition-colors"
            data-i18n="common.nav.docs"
            href="docs.html">文档</a>
          <a
            data-nav-key="pricing"
            data-nav-active-class="block rounded-2xl px-4 py-3 text-sm font-semibold bg-[#1B3A6B] text-white"
            data-nav-inactive-class="block rounded-2xl px-4 py-3 text-sm font-medium text-custom-navy bg-white/80 dark:text-white dark:bg-white/10 hover:bg-white dark:hover:bg-white/15 transition-colors"
            data-i18n="common.nav.pricing"
            href="pricing.html">价格</a>

      </div>
    </div>
